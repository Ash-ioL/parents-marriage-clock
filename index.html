<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, intial-scale=1.0">
        <meta name="description" content="A marriage clock tracking the years, days, minutes, and seconds that my parents have been married to each other.">
        <meta name="robots" content="noindex, nofollow">

        <link rel="stylesheet" href="style.css">

        <title>My Parents' Marriage Clock</title>
    </head>
    <body>
        <div id="clock-container" class="active">
            <div id="clock" class="quint">
                <div class="date-box" id="years-date-box">
                    <p id="years" class = "0"></p>
                    <p id="years-desc" class="lav">years</p>
                </div>
                <div class="date-box" id="months-date-box">
                    <p id="months" class = "1"></p>
                    <p id="months-desc" class="lav">months</p>
                </div>
                <div class="date-box" id="days-date-box">
                    <p id="days" class = "2"></p>
                    <p id="days-desc" class="lav">days</p>
                </div>
                <div class="date-box" id="hours-date-box">
                    <p id="hours" class = "3"></p>
                    <p id="hours-desc" class="lav">hours</p>
                </div>
                <div class="date-box" id="minutes-date-box">
                    <p id="minutes" class = "4"></p>
                    <p id="minutes-desc" class="lav">minutes</p>
                </div>
                <div class="date-box" id="seconds-date-box">
                    <p id="seconds" class = "5"></p>
                    <p id="seconds-desc" class="lav">seconds</p>
                </div>
            </div>
        </div>
        <div id="bottom-arrow-container">
            <div id="bottom-arrow"></div>
        </div>
        <div id="notes-container">
            <h1 id="clock" class="quint">Notes Container</h1>
        </div>
        <div id="top-arrow-container">
            <div id="top-arrow"></div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
